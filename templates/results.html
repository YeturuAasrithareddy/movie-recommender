<!DOCTYPE html>
<html>
<head>
    <title>Results - Movie Recommender</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0f;
            color: #e8e0d0;
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 { color: #f5c842; margin-bottom: 24px; }
        .movie {
            background: #111118;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .movie h3 { color: #f5c842; margin-bottom: 6px; }
        .rating {
            display: inline-block;
            background: #1a160a;
            border: 1px solid #f5c842;
            color: #f5c842;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }
        .overview { color: #aaa; font-size: 0.9rem; line-height: 1.5; }
        .back {
            display: inline-block;
            margin-top: 24px;
            padding: 10px 20px;
            background: #f5c842;
            color: #0a0a0f;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }
        .back:hover { background: #ffd700; }
        .empty { color: #888; text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <h1>{{ title }}</h1>

    {% if movies %}
        {% for movie in movies %}
        <div class="movie">
            <h3>{{ movie.title }} ({{ movie.year }})</h3>
            <div class="rating">⭐ {{ movie.rating }}/10</div>
            <p class="overview">{{ movie.overview }}</p>
        </div>
        {% endfor %}
    {% else %}
        <div class="empty">
            <p>No movies found. Try a different search!</p>
        </div>
    {% endif %}

    <a href="/" class="back">← Search Again</a>
</body>
</html>
